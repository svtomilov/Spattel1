<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Страница не найдена — Spattel</title>
<style>
:root{--ink:#14181F;--mut:#5B6472;--line:#E4E8EA;--g50:#E9FBEF;--g600:#16A34A;--g700:#15803D;--bg:#F6F8F7;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Manrope','Segoe UI',-apple-system,'DejaVu Sans',sans-serif;color:var(--ink);background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;}
.logo img{height:30px;margin-bottom:28px;}
.big{font-size:84px;font-weight:800;letter-spacing:-.03em;color:var(--g600);line-height:1;}
h1{font-size:24px;font-weight:800;margin:14px 0 8px;}
p{color:var(--mut);max-width:440px;margin:0 auto 24px;line-height:1.6;}
.btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
a.btn{display:inline-block;text-decoration:none;font-weight:700;font-size:15px;border-radius:11px;padding:13px 22px;}
a.primary{background:var(--g700);color:#fff;}
a.sec{background:#fff;color:var(--g700);border:1.5px solid var(--g600);}
a.primary:hover{background:var(--g600);}
</style></head>
<body>
  <span class="logo"><img src="/spattel-logo.svg" alt="Spattel"></span>
  <div class="big">404</div>
  <h1>Такой страницы нет</h1>
  <p>Возможно, ссылка устарела или страница переехала. Вернитесь на главную — оттуда можно рассчитать ремонт и оставить заявку.</p>
  <div class="btns">
    <a class="btn primary" href="/">На главную</a>
    <a class="btn sec" href="/#calc">Рассчитать ремонт</a>
  </div>
</body></html>
